package:
    namespace:        null
    name:             null
    fullname:         null

app:
    name:             app
    init:
        image:        "alpine"
        tag:          "latest"
        command:      [ "sh", "-c", "chown 10000:10000 /data && chmod 755 /data" ]
    container:
        image:        "engelschall/k8s-sample"
        tag:          "0.9.6-20260605"
        replicas:     1
        restart:      Always
        args:
            default:  [ "-d", "sqlite3:/data/app.sqlite" ]
            db:       [ "-d", "pg:postgres://app:app@k8s-sample-db:5432/app" ]
        env:
            default:
            db:
                K8S_SAMPLE_OPTS_DOCKERIZE: "-wait tcp://k8s-sample-db:5432 -timeout 60s"
    service:
        type:         ClusterIP
        protocol:     TCP
        port:         9090
        url:          /k8s-sample
    storage:
        path:         /data
        mode:         null
        type:         csi-hostpath-sc
        size:         100Mi
        gid:          null
        shared:       false

db:
    enabled:          false
    name:             db
    initdb:
        script:       files/init-user-db.sh
    container:
        image:        "postgres"
        tag:          "16"
        replicas:     1
        restart:      Always
        args:         []
        env:
            POSTGRES_USER:       postgresql
            POSTGRES_PASSWORD:   postgresql
            CFG_CUSTOM_DATABASE: app
            CFG_CUSTOM_PASSWORD: app
            CFG_CUSTOM_USERNAME: app
    service:
        type:         ClusterIP
        protocol:     TCP
        port:         5432
    storage:
        path:         /var/lib/postgresql/data
        type:         csi-hostpath-sc
        size:         100Mi
        gid:          null
        shared:       false

